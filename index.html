<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Congratulations Pat &amp; Arabella</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #0b1026;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: #f5e9d4;
  }
  #sky {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 110%, #f7c59f 0%, #e07a5f 18%, #9d5378 38%, #4a3a6b 60%, #1a1f44 85%, #0b1026 100%);
  }
  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  .ui {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
    opacity: 0.7;
    transition: opacity 0.3s;
  }
  .ui:hover { opacity: 1; }
  button {
    background: rgba(255, 245, 225, 0.08);
    border: 1px solid rgba(255, 245, 225, 0.25);
    color: #f5e9d4;
    font-family: inherit;
    font-size: 16px;
    letter-spacing: 0.05em;
    padding: 8px 18px;
    border-radius: 999px;
    cursor: pointer;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: background 0.2s, transform 0.1s;
  }
  button:hover { background: rgba(255, 245, 225, 0.18); }
  button:active { transform: scale(0.97); }
  .intro {
    position: fixed;
    top: 28px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 5;
    pointer-events: none;
    font-size: clamp(14px, 2vw, 20px);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0;
    color: rgba(245, 233, 212, 0.7);
    animation: fadeIn 2s ease-out 0.5s forwards, fadeOut 2s ease-out 8s forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes fadeOut { to { opacity: 0; } }
  .message {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 4;
    pointer-events: none;
    opacity: 0;
    transition: opacity 2.5s ease-out;
    text-align: center;
    text-shadow: 0 2px 24px rgba(11, 16, 38, 0.6), 0 0 60px rgba(247, 197, 159, 0.25);
  }
  .message.show { opacity: 1; }
  .message .line1 {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 600;
    font-size: clamp(28px, 4.5vw, 64px);
    letter-spacing: 0.04em;
    color: #fff7e6;
    margin-bottom: 0.1em;
  }
  .message .line2 {
    font-family: 'Great Vibes', 'Cormorant Garamond', cursive;
    font-weight: 400;
    font-size: clamp(56px, 9vw, 140px);
    line-height: 1;
    color: #fff7e6;
  }
  .message .tagline {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-style: italic;
    font-weight: 400;
    font-size: clamp(15px, 1.9vw, 24px);
    letter-spacing: 0.05em;
    color: rgba(255, 247, 230, 0.85);
    margin-top: 0.9em;
    opacity: 0;
    transition: opacity 2s ease-out 1.5s; /* delayed fade after names appear */
    max-width: min(80vw, 720px);
  }
  .message.show .tagline { opacity: 1; }
  .message .signoff {
    font-family: 'Great Vibes', 'Cormorant Garamond', cursive;
    font-weight: 400;
    font-size: clamp(22px, 3vw, 40px);
    line-height: 1.15;
    color: #fff7e6;
    margin-top: 1.1em;
    opacity: 0;
    transition: opacity 2s ease-out 3.5s; /* fades in after the tagline */
  }
  .message.show .signoff { opacity: 1; }
</style>
</head>
<body>
  <div id="sky"></div>
  <canvas id="stage"></canvas>
  <div class="intro">for Pat &amp; Arabella</div>
  <div class="message" id="message">
    <div class="line1">Congratulations</div>
    <div class="line2">Pat &amp; Arabella</div>
    <div class="tagline">Two birds, one sky — may your flight together be long, your nest warm, and your song never end.</div>
    <div class="signoff">Love,<br>Derek, Lucy &amp; Ava Lomibao</div>
  </div>
  <div class="ui">
    <button id="replay">Replay</button>
    <button id="skip">Skip ahead</button>
  </div>
<script>
(() => {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    rebuildTargets();
  }
  window.addEventListener('resize', resize);

  // ---------- Target shape sampling ----------
  // We render the heart + text into an offscreen canvas, sample dark pixels
  // as target points, and assign each bird a target.

  const off = document.createElement('canvas');
  const offCtx = off.getContext('2d');

  function sampleShapePoints(drawFn, count, padding = 40) {
    off.width = W;
    off.height = H;
    offCtx.setTransform(1, 0, 0, 1, 0, 0);
    offCtx.clearRect(0, 0, off.width, off.height);
    offCtx.fillStyle = '#fff';
    drawFn(offCtx, off.width, off.height);
    const img = offCtx.getImageData(0, 0, off.width, off.height).data;
    const pts = [];
    const stride = 2; // sample every 2 pixels
    for (let y = 0; y < off.height; y += stride) {
      for (let x = 0; x < off.width; x += stride) {
        const a = img[(y * off.width + x) * 4 + 3];
        if (a > 128) pts.push([x, y]);
      }
    }
    // Shuffle then trim/pad to count
    for (let i = pts.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [pts[i], pts[j]] = [pts[j], pts[i]];
    }
    if (pts.length === 0) return [];
    const out = [];
    for (let i = 0; i < count; i++) out.push(pts[i % pts.length]);
    return out;
  }

  function drawHeart(c, w, h) {
    // Parametric heart, centered
    const cx = w / 2;
    const cy = h / 2;
    const scale = Math.min(w, h) * 0.018;
    c.beginPath();
    const steps = 400;
    for (let i = 0; i <= steps; i++) {
      const t = (i / steps) * Math.PI * 2;
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
      const px = cx + x * scale;
      const py = cy + y * scale;
      if (i === 0) c.moveTo(px, py); else c.lineTo(px, py);
    }
    c.closePath();
    c.fill();
  }

  function drawText(c, w, h) {
    // Match the DOM message exactly so bird-formed text aligns with the
    // real text that fades in afterward. The .message element is laid out
    // even while hidden (opacity:0), so getBoundingClientRect is accurate.
    const line1El = document.querySelector('.message .line1');
    const line2El = document.querySelector('.message .line2');
    if (!line1El || !line2El) return;
    const r1 = line1El.getBoundingClientRect();
    const r2 = line2El.getBoundingClientRect();
    const cs1 = getComputedStyle(line1El);
    const cs2 = getComputedStyle(line2El);

    c.fillStyle = '#fff';
    c.textAlign = 'center';
    c.textBaseline = 'middle';

    c.font = `${cs1.fontStyle} ${cs1.fontWeight} ${cs1.fontSize} ${cs1.fontFamily}`;
    c.fillText('Congratulations', r1.left + r1.width / 2, r1.top + r1.height / 2);

    c.font = `${cs2.fontStyle} ${cs2.fontWeight} ${cs2.fontSize} ${cs2.fontFamily}`;
    c.fillText('Pat & Arabella', r2.left + r2.width / 2, r2.top + r2.height / 2);
  }

  // ---------- Birds ----------
  const N = Math.min(1600, Math.max(500, Math.floor((W * H) / 1400)));
  const birds = [];

  function makeBird() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 2,
      vy: (Math.random() - 0.5) * 2,
      flap: Math.random() * Math.PI * 2,
      flapSpeed: 0.25 + Math.random() * 0.2,
      size: 2.2 + Math.random() * 1.6,
      tint: Math.random(),
      target: null,
      independent: Math.random() < 0.06,
    };
  }
  for (let i = 0; i < N; i++) birds.push(makeBird());

  let heartTargets = [];
  let textTargets = [];

  function rebuildTargets() {
    heartTargets = sampleShapePoints(drawHeart, N);
    textTargets = sampleShapePoints(drawText, N);
  }

  // ---------- Phases ----------
  // 0: free flocking
  // 1: morph to heart
  // 2: hold heart (gentle pulse)
  // 3: morph to text
  // 4: hold text formed by birds
  // 5: reveal — real text fades in, birds release into gentle flock
  const PHASE_TIMINGS = [9, 5, 6, 5, 5, Infinity]; // seconds per phase
  const messageEl = document.getElementById('message');
  let phase = 0;
  let phaseTime = 0;
  let startTime = performance.now();

  function setPhase(p) {
    phase = p;
    phaseTime = 0;
    if (p === 1) {
      for (let i = 0; i < N; i++) birds[i].target = birds[i].independent ? null : heartTargets[i];
    } else if (p === 3) {
      for (let i = 0; i < N; i++) birds[i].target = birds[i].independent ? null : textTargets[i];
    } else if (p === 5) {
      // Release: clear targets, give a soft outward kick so birds disperse
      // around the now-visible text.
      messageEl.classList.add('show');
      const cx = W / 2, cy = H / 2;
      for (let i = 0; i < N; i++) {
        const b = birds[i];
        b.target = null;
        const dx = b.x - cx, dy = b.y - cy;
        const d = Math.hypot(dx, dy) || 1;
        b.vx += (dx / d) * 1.6 + (Math.random() - 0.5) * 0.8;
        b.vy += (dy / d) * 1.6 + (Math.random() - 0.5) * 0.8;
      }
    } else if (p === 0) {
      messageEl.classList.remove('show');
      for (let i = 0; i < N; i++) birds[i].target = null;
    }
  }

  // ---------- Flocking forces ----------
  // Spatial hash for neighbor queries
  const CELL = 28;
  let grid = new Map();
  function cellKey(x, y) {
    return ((x / CELL) | 0) + ',' + ((y / CELL) | 0);
  }
  function rebuildGrid() {
    grid.clear();
    for (let i = 0; i < N; i++) {
      const b = birds[i];
      const k = cellKey(b.x, b.y);
      let arr = grid.get(k);
      if (!arr) { arr = []; grid.set(k, arr); }
      arr.push(i);
    }
  }
  function neighbors(b) {
    const cx = (b.x / CELL) | 0;
    const cy = (b.y / CELL) | 0;
    const out = [];
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        const arr = grid.get((cx + dx) + ',' + (cy + dy));
        if (arr) for (const i of arr) out.push(i);
      }
    }
    return out;
  }

  const MAX_SPEED = 2.6;
  const MIN_SPEED = 1.0;

  // Pointer attractor: while pressed, birds are drawn toward the pointer.
  const pointer = { active: false, x: 0, y: 0 };
  function setPointer(e) {
    const t = e.touches ? e.touches[0] : e;
    pointer.x = t.clientX;
    pointer.y = t.clientY;
  }
  window.addEventListener('pointerdown', (e) => {
    if (e.target.closest('button')) return; // don't attract when tapping UI
    pointer.active = true;
    setPointer(e);
  });
  window.addEventListener('pointermove', (e) => { if (pointer.active) setPointer(e); });
  window.addEventListener('pointerup',   () => { pointer.active = false; });
  window.addEventListener('pointercancel', () => { pointer.active = false; });
  window.addEventListener('pointerleave', () => { pointer.active = false; });

  function limit(b, max, min) {
    const sp = Math.hypot(b.vx, b.vy);
    if (sp > max) { b.vx = b.vx / sp * max; b.vy = b.vy / sp * max; }
    else if (sp < min && sp > 0) { b.vx = b.vx / sp * min; b.vy = b.vy / sp * min; }
  }

  function step(dt) {
    rebuildGrid();

    // Flocking strength scales down as we morph
    const baseFlockK = phase === 0 ? 1.0
                : phase === 1 ? Math.max(0, 1 - phaseTime / PHASE_TIMINGS[1]) * 0.4
                : phase === 2 ? 0.15
                : phase === 3 ? Math.max(0, 1 - phaseTime / PHASE_TIMINGS[3]) * 0.3
                : phase === 4 ? 0.1
                : 1.0; // phase 5: full flocking again

    const baseTargetK = phase === 0 ? 0
                  : phase === 1 ? Math.min(1, phaseTime / PHASE_TIMINGS[1]) * 0.08
                  : phase === 2 ? 0.09
                  : phase === 3 ? Math.min(1, phaseTime / PHASE_TIMINGS[3]) * 0.10
                  : phase === 4 ? 0.11
                  : 0;

    const damp = (phase === 2 || phase === 3 || phase === 4) ? 0.94 : 0.99;
    const freeMotionPhase = (phase === 0 || phase === 5);

    for (let i = 0; i < N; i++) {
      const b = birds[i];
      // Independent birds always free-flock at full strength regardless of phase.
      const flockK = b.independent ? 1.0 : baseFlockK;
      const targetK = b.independent ? 0 : baseTargetK;

      if (flockK > 0.01) {
        const ns = neighbors(b);
        let sepX = 0, sepY = 0;
        let aliX = 0, aliY = 0;
        let cohX = 0, cohY = 0;
        let aliN = 0, cohN = 0;
        const SEP_R = 8, ALI_R = 22, COH_R = 32;

        for (const j of ns) {
          if (j === i) continue;
          const o = birds[j];
          const dx = b.x - o.x;
          const dy = b.y - o.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < SEP_R * SEP_R && d2 > 0) {
            sepX += dx / d2;
            sepY += dy / d2;
          }
          if (d2 < ALI_R * ALI_R) {
            aliX += o.vx; aliY += o.vy; aliN++;
          }
          if (d2 < COH_R * COH_R) {
            cohX += o.x; cohY += o.y; cohN++;
          }
        }

        b.vx += sepX * 1.4 * flockK;
        b.vy += sepY * 1.4 * flockK;
        if (aliN > 0) {
          b.vx += ((aliX / aliN) - b.vx) * 0.05 * flockK;
          b.vy += ((aliY / aliN) - b.vy) * 0.05 * flockK;
        }
        if (cohN > 0) {
          b.vx += ((cohX / cohN) - b.x) * 0.0008 * flockK;
          b.vy += ((cohY / cohN) - b.y) * 0.0008 * flockK;
        }

        // Gentle wander
        b.vx += (Math.random() - 0.5) * 0.05 * flockK;
        b.vy += (Math.random() - 0.5) * 0.05 * flockK;
      }

      // Pointer attractor — strong but distance-falloff so close birds swirl
      // instead of piling up. Works in every phase.
      if (pointer.active) {
        const dx = pointer.x - b.x;
        const dy = pointer.y - b.y;
        const d2 = dx * dx + dy * dy;
        const d = Math.sqrt(d2) + 0.001;
        // Inverse falloff capped near the cursor so birds orbit, don't singularity-collapse
        const pull = 60 / (d + 20);
        b.vx += (dx / d) * pull * 0.06;
        b.vy += (dy / d) * pull * 0.06;
      }

      // Target seek
      if (b.target && targetK > 0) {
        const tx = b.target[0];
        const ty = b.target[1];
        const dx = tx - b.x;
        const dy = ty - b.y;
        b.vx += dx * targetK;
        b.vy += dy * targetK;
        // Stronger damping when close, so they settle
        const dist2 = dx * dx + dy * dy;
        if (dist2 < 100) {
          b.vx *= 0.85;
          b.vy *= 0.85;
        }
      }

      // Soft edge bounce during free-motion phases (incl. independents always)
      if (freeMotionPhase || b.independent) {
        const margin = 30;
        if (b.x < margin) b.vx += 0.05;
        if (b.x > W - margin) b.vx -= 0.05;
        if (b.y < margin) b.vy += 0.05;
        if (b.y > H - margin) b.vy -= 0.05;
      }

      // Velocity caps
      const flying = freeMotionPhase || b.independent;
      const speedCap = flying ? MAX_SPEED : 4.5;
      limit(b, speedCap, flying ? MIN_SPEED : 0);

      const d = b.independent ? 0.99 : damp;
      b.vx *= d;
      b.vy *= d;
      b.x += b.vx;
      b.y += b.vy;
      b.flap += b.flapSpeed * (0.5 + Math.min(1, Math.hypot(b.vx, b.vy) / 2));
    }
  }

  // ---------- Render ----------
  function drawBird(b) {
    const angle = Math.atan2(b.vy, b.vx);
    const s = b.size;
    const wingPhase = Math.sin(b.flap);
    // Wing spread varies with flap: 0.6..1.0 of size
    const wing = s * (0.85 + 0.45 * wingPhase);

    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(angle);

    // Color: warm palette, slight per-bird variation
    const hue = 28 + b.tint * 22;       // amber / rose
    const light = 78 + wingPhase * 8;
    ctx.fillStyle = `hsla(${hue}, 70%, ${light}%, 0.92)`;
    ctx.strokeStyle = `hsla(${hue}, 60%, 40%, 0.6)`;
    ctx.lineWidth = 0.6;

    // Simple stylized bird: two wing strokes (V) with a tiny body
    ctx.beginPath();
    // left wing
    ctx.moveTo(-wing, -wing * 0.55);
    ctx.quadraticCurveTo(-wing * 0.3, 0, 0, 0);
    // body
    ctx.lineTo(s * 0.6, 0);
    // right wing
    ctx.quadraticCurveTo(-wing * 0.3, 0, -wing, wing * 0.55);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function render() {
    // Trail/fade
    ctx.fillStyle = phase === 0 ? 'rgba(11, 16, 38, 0.14)' : 'rgba(11, 16, 38, 0.34)';
    ctx.fillRect(0, 0, W, H);

    for (let i = 0; i < N; i++) drawBird(birds[i]);
  }

  // ---------- Main loop ----------
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(33, now - last) / 16.6667;
    last = now;
    if (loop._lastNow == null) loop._lastNow = now;
    phaseTime += (now - loop._lastNow) / 1000;
    loop._lastNow = now;

    if (phaseTime > PHASE_TIMINGS[phase] && phase < PHASE_TIMINGS.length - 1) {
      setPhase(phase + 1);
    }

    step(dt);
    render();
    requestAnimationFrame(loop);
  }

  function reset() {
    for (let i = 0; i < N; i++) {
      const b = birds[i];
      b.x = Math.random() * W;
      b.y = Math.random() * H;
      const a = Math.random() * Math.PI * 2;
      const sp = 1.5 + Math.random();
      b.vx = Math.cos(a) * sp;
      b.vy = Math.sin(a) * sp;
      b.target = null;
    }
    setPhase(0);
    loop._lastNow = performance.now();
  }

  document.getElementById('replay').addEventListener('click', reset);
  document.getElementById('skip').addEventListener('click', () => {
    // Cycle: → heart → bird-text → reveal (real text) → restart
    if (phase < 1) setPhase(1);
    else if (phase < 3) setPhase(3);
    else if (phase < 5) setPhase(5);
    else setPhase(0);
  });

  // Wait for fonts so text shape sampling uses the right glyphs
  function start() {
    resize();
    reset();
    requestAnimationFrame(loop);
  }
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(start);
  } else {
    start();
  }
})();
</script>
</body>
</html>
