<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Congratulations Pat &amp; Arabella</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  html, body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    background: #0b1026;
    font-family: 'Cormorant Garamond', Georgia, serif;
    color: #f5e9d4;
  }
  #sky {
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 50% 110%, #f7c59f 0%, #e07a5f 18%, #9d5378 38%, #4a3a6b 60%, #1a1f44 85%, #0b1026 100%);
  }
  canvas {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    display: block;
  }
  .ui {
    position: fixed;
    bottom: 18px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 12px;
    z-index: 10;
    opacity: 0.7;
    transition: opacity 0.3s;
  }
  .ui:hover { opacity: 1; }
  button {
    background: rgba(255, 245, 225, 0.08);
    border: 1px solid rgba(255, 245, 225, 0.25);
    color: #f5e9d4;
    font-family: inherit;
    font-size: 16px;
    letter-spacing: 0.05em;
    padding: 8px 18px;
    border-radius: 999px;
    cursor: pointer;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    transition: background 0.2s, transform 0.1s;
  }
  button:hover { background: rgba(255, 245, 225, 0.18); }
  button:active { transform: scale(0.97); }
  .intro {
    position: fixed;
    top: 28px;
    left: 0;
    right: 0;
    text-align: center;
    z-index: 5;
    pointer-events: none;
    font-size: clamp(14px, 2vw, 20px);
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0;
    color: rgba(245, 233, 212, 0.7);
    animation: fadeIn 2s ease-out 0.5s forwards, fadeOut 2s ease-out 8s forwards;
  }
  @keyframes fadeIn { to { opacity: 1; } }
  @keyframes fadeOut { to { opacity: 0; } }
</style>
</head>
<body>
  <div id="sky"></div>
  <canvas id="stage"></canvas>
  <div class="intro">for Pat &amp; Arabella</div>
  <div class="ui">
    <button id="replay">Replay</button>
    <button id="skip">Skip ahead</button>
  </div>
<script>
(() => {
  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0, DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    W = window.innerWidth;
    H = window.innerHeight;
    canvas.width = Math.floor(W * DPR);
    canvas.height = Math.floor(H * DPR);
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';
    ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
    rebuildTargets();
  }
  window.addEventListener('resize', resize);

  // ---------- Target shape sampling ----------
  // We render the heart + text into an offscreen canvas, sample dark pixels
  // as target points, and assign each bird a target.

  const off = document.createElement('canvas');
  const offCtx = off.getContext('2d');

  function sampleShapePoints(drawFn, count, padding = 40) {
    off.width = Math.max(800, W);
    off.height = Math.max(600, H);
    offCtx.setTransform(1, 0, 0, 1, 0, 0);
    offCtx.clearRect(0, 0, off.width, off.height);
    offCtx.fillStyle = '#fff';
    drawFn(offCtx, off.width, off.height);
    const img = offCtx.getImageData(0, 0, off.width, off.height).data;
    const pts = [];
    const stride = 3; // sample every 3 pixels
    for (let y = 0; y < off.height; y += stride) {
      for (let x = 0; x < off.width; x += stride) {
        const a = img[(y * off.width + x) * 4 + 3];
        if (a > 128) pts.push([x, y]);
      }
    }
    // Shuffle then trim/pad to count
    for (let i = pts.length - 1; i > 0; i--) {
      const j = (Math.random() * (i + 1)) | 0;
      [pts[i], pts[j]] = [pts[j], pts[i]];
    }
    if (pts.length === 0) return [];
    const out = [];
    for (let i = 0; i < count; i++) out.push(pts[i % pts.length]);
    return out;
  }

  function drawHeart(c, w, h) {
    // Parametric heart, centered
    const cx = w / 2;
    const cy = h / 2;
    const scale = Math.min(w, h) * 0.018;
    c.beginPath();
    const steps = 400;
    for (let i = 0; i <= steps; i++) {
      const t = (i / steps) * Math.PI * 2;
      const x = 16 * Math.pow(Math.sin(t), 3);
      const y = -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t));
      const px = cx + x * scale;
      const py = cy + y * scale;
      if (i === 0) c.moveTo(px, py); else c.lineTo(px, py);
    }
    c.closePath();
    c.fill();
  }

  function drawText(c, w, h) {
    const cx = w / 2;
    const cy = h / 2;
    c.fillStyle = '#fff';
    c.textAlign = 'center';
    c.textBaseline = 'middle';
    const big = Math.min(w * 0.08, h * 0.14);
    const small = Math.min(w * 0.045, h * 0.075);
    c.font = `600 ${small}px "Cormorant Garamond", Georgia, serif`;
    c.fillText('Congratulations', cx, cy - big * 0.85);
    c.font = `400 ${big}px "Great Vibes", "Cormorant Garamond", cursive`;
    c.fillText('Pat & Arabella', cx, cy + big * 0.15);
  }

  // ---------- Birds ----------
  const N = Math.min(700, Math.max(280, Math.floor((W * H) / 3200)));
  const birds = [];

  function makeBird() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      vx: (Math.random() - 0.5) * 2,
      vy: (Math.random() - 0.5) * 2,
      flap: Math.random() * Math.PI * 2,
      flapSpeed: 0.25 + Math.random() * 0.2,
      size: 4 + Math.random() * 2.5,
      tint: Math.random(),
      target: null,
    };
  }
  for (let i = 0; i < N; i++) birds.push(makeBird());

  let heartTargets = [];
  let textTargets = [];

  function rebuildTargets() {
    heartTargets = sampleShapePoints(drawHeart, N);
    textTargets = sampleShapePoints(drawText, N);
  }

  // ---------- Phases ----------
  // 0: free flocking
  // 1: morph to heart
  // 2: hold heart (gentle pulse)
  // 3: morph to text
  // 4: hold text (gentle drift)
  const PHASE_TIMINGS = [9, 5, 6, 5, Infinity]; // seconds per phase
  let phase = 0;
  let phaseTime = 0;
  let startTime = performance.now();

  function setPhase(p) {
    phase = p;
    phaseTime = 0;
    if (p === 1) {
      for (let i = 0; i < N; i++) birds[i].target = heartTargets[i];
    } else if (p === 3) {
      for (let i = 0; i < N; i++) birds[i].target = textTargets[i];
    } else if (p === 0) {
      for (let i = 0; i < N; i++) birds[i].target = null;
    }
  }

  // ---------- Flocking forces ----------
  // Spatial hash for neighbor queries
  const CELL = 40;
  let grid = new Map();
  function cellKey(x, y) {
    return ((x / CELL) | 0) + ',' + ((y / CELL) | 0);
  }
  function rebuildGrid() {
    grid.clear();
    for (let i = 0; i < N; i++) {
      const b = birds[i];
      const k = cellKey(b.x, b.y);
      let arr = grid.get(k);
      if (!arr) { arr = []; grid.set(k, arr); }
      arr.push(i);
    }
  }
  function neighbors(b) {
    const cx = (b.x / CELL) | 0;
    const cy = (b.y / CELL) | 0;
    const out = [];
    for (let dy = -1; dy <= 1; dy++) {
      for (let dx = -1; dx <= 1; dx++) {
        const arr = grid.get((cx + dx) + ',' + (cy + dy));
        if (arr) for (const i of arr) out.push(i);
      }
    }
    return out;
  }

  const MAX_SPEED = 2.6;
  const MIN_SPEED = 1.0;

  function limit(b, max, min) {
    const sp = Math.hypot(b.vx, b.vy);
    if (sp > max) { b.vx = b.vx / sp * max; b.vy = b.vy / sp * max; }
    else if (sp < min && sp > 0) { b.vx = b.vx / sp * min; b.vy = b.vy / sp * min; }
  }

  function step(dt) {
    rebuildGrid();

    // Flocking strength scales down as we morph
    const flockK = phase === 0 ? 1.0
                : phase === 1 ? Math.max(0, 1 - phaseTime / PHASE_TIMINGS[1]) * 0.4
                : phase === 2 ? 0.15
                : phase === 3 ? Math.max(0, 1 - phaseTime / PHASE_TIMINGS[3]) * 0.3
                : 0.1;

    const targetK = phase === 0 ? 0
                  : phase === 1 ? Math.min(1, phaseTime / PHASE_TIMINGS[1]) * 0.08
                  : phase === 2 ? 0.09
                  : phase === 3 ? Math.min(1, phaseTime / PHASE_TIMINGS[3]) * 0.10
                  : 0.11;

    const damp = (phase >= 2) ? 0.94 : 0.99;

    for (let i = 0; i < N; i++) {
      const b = birds[i];

      if (flockK > 0.01) {
        const ns = neighbors(b);
        let sepX = 0, sepY = 0;
        let aliX = 0, aliY = 0;
        let cohX = 0, cohY = 0;
        let aliN = 0, cohN = 0;
        const SEP_R = 14, ALI_R = 36, COH_R = 50;

        for (const j of ns) {
          if (j === i) continue;
          const o = birds[j];
          const dx = b.x - o.x;
          const dy = b.y - o.y;
          const d2 = dx * dx + dy * dy;
          if (d2 < SEP_R * SEP_R && d2 > 0) {
            sepX += dx / d2;
            sepY += dy / d2;
          }
          if (d2 < ALI_R * ALI_R) {
            aliX += o.vx; aliY += o.vy; aliN++;
          }
          if (d2 < COH_R * COH_R) {
            cohX += o.x; cohY += o.y; cohN++;
          }
        }

        b.vx += sepX * 1.4 * flockK;
        b.vy += sepY * 1.4 * flockK;
        if (aliN > 0) {
          b.vx += ((aliX / aliN) - b.vx) * 0.05 * flockK;
          b.vy += ((aliY / aliN) - b.vy) * 0.05 * flockK;
        }
        if (cohN > 0) {
          b.vx += ((cohX / cohN) - b.x) * 0.0008 * flockK;
          b.vy += ((cohY / cohN) - b.y) * 0.0008 * flockK;
        }

        // Gentle wander
        b.vx += (Math.random() - 0.5) * 0.05 * flockK;
        b.vy += (Math.random() - 0.5) * 0.05 * flockK;
      }

      // Target seek
      if (b.target && targetK > 0) {
        const tx = b.target[0];
        const ty = b.target[1];
        const dx = tx - b.x;
        const dy = ty - b.y;
        b.vx += dx * targetK;
        b.vy += dy * targetK;
        // Stronger damping when close, so they settle
        const dist2 = dx * dx + dy * dy;
        if (dist2 < 100) {
          b.vx *= 0.85;
          b.vy *= 0.85;
        }
      }

      // Soft edge wrap during free flocking; gentle nudge otherwise
      if (phase === 0) {
        const margin = 30;
        if (b.x < margin) b.vx += 0.05;
        if (b.x > W - margin) b.vx -= 0.05;
        if (b.y < margin) b.vy += 0.05;
        if (b.y > H - margin) b.vy -= 0.05;
      }

      // Velocity caps
      const speedCap = phase >= 2 ? 4.5 : MAX_SPEED;
      limit(b, speedCap, phase >= 2 ? 0 : MIN_SPEED);

      b.vx *= damp;
      b.vy *= damp;
      b.x += b.vx;
      b.y += b.vy;
      b.flap += b.flapSpeed * (0.5 + Math.min(1, Math.hypot(b.vx, b.vy) / 2));
    }
  }

  // ---------- Render ----------
  function drawBird(b) {
    const angle = Math.atan2(b.vy, b.vx);
    const s = b.size;
    const wingPhase = Math.sin(b.flap);
    // Wing spread varies with flap: 0.6..1.0 of size
    const wing = s * (0.85 + 0.45 * wingPhase);

    ctx.save();
    ctx.translate(b.x, b.y);
    ctx.rotate(angle);

    // Color: warm palette, slight per-bird variation
    const hue = 28 + b.tint * 22;       // amber / rose
    const light = 78 + wingPhase * 8;
    ctx.fillStyle = `hsla(${hue}, 70%, ${light}%, 0.92)`;
    ctx.strokeStyle = `hsla(${hue}, 60%, 40%, 0.6)`;
    ctx.lineWidth = 0.6;

    // Simple stylized bird: two wing strokes (V) with a tiny body
    ctx.beginPath();
    // left wing
    ctx.moveTo(-wing, -wing * 0.55);
    ctx.quadraticCurveTo(-wing * 0.3, 0, 0, 0);
    // body
    ctx.lineTo(s * 0.6, 0);
    // right wing
    ctx.quadraticCurveTo(-wing * 0.3, 0, -wing, wing * 0.55);
    ctx.closePath();
    ctx.fill();

    ctx.restore();
  }

  function render() {
    // Trail/fade
    ctx.fillStyle = phase === 0 ? 'rgba(11, 16, 38, 0.18)' : 'rgba(11, 16, 38, 0.28)';
    ctx.fillRect(0, 0, W, H);

    for (let i = 0; i < N; i++) drawBird(birds[i]);
  }

  // ---------- Main loop ----------
  let last = performance.now();
  function loop(now) {
    const dt = Math.min(33, now - last) / 16.6667;
    last = now;
    if (loop._lastNow == null) loop._lastNow = now;
    phaseTime += (now - loop._lastNow) / 1000;
    loop._lastNow = now;

    if (phaseTime > PHASE_TIMINGS[phase] && phase < PHASE_TIMINGS.length - 1) {
      setPhase(phase + 1);
    }

    step(dt);
    render();
    requestAnimationFrame(loop);
  }

  function reset() {
    for (let i = 0; i < N; i++) {
      const b = birds[i];
      b.x = Math.random() * W;
      b.y = Math.random() * H;
      const a = Math.random() * Math.PI * 2;
      const sp = 1.5 + Math.random();
      b.vx = Math.cos(a) * sp;
      b.vy = Math.sin(a) * sp;
      b.target = null;
    }
    setPhase(0);
    loop._lastNow = performance.now();
  }

  document.getElementById('replay').addEventListener('click', reset);
  document.getElementById('skip').addEventListener('click', () => {
    if (phase < 1) setPhase(1);
    else if (phase < 3) setPhase(3);
    else setPhase(0);
  });

  // Wait for fonts so text shape sampling uses the right glyphs
  if (document.fonts && document.fonts.ready) {
    document.fonts.ready.then(() => {
      resize();
      requestAnimationFrame(loop);
    });
  } else {
    resize();
    requestAnimationFrame(loop);
  }
})();
</script>
</body>
</html>
